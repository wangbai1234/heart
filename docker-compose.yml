version: '3.8'

services:
  # PostgreSQL 15+ with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: heart-postgres
    environment:
      POSTGRES_USER: heart
      POSTGRES_PASSWORD: heartdev
      POSTGRES_DB: heart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heart-network

  # Redis 7+ for cache and event bus
  redis:
    image: redis:7-alpine
    container_name: heart-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heart-network

  # MinIO (S3-compatible local storage, optional)
  minio:
    image: minio/minio:latest
    container_name: heart-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - heart-network
    profiles:
      - storage

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  heart-network:
    driver: bridge
