version: '3.8'

services:
  # PostgreSQL 15+ with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: heart-postgres
    environment:
      POSTGRES_USER: heart
      POSTGRES_PASSWORD: heartdev
      POSTGRES_DB: heart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heart-network

  # Redis 7+ for cache and event bus
  redis:
    image: redis:7-alpine
    container_name: heart-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heart-network

  # MinIO (S3-compatible local storage, optional)
  minio:
    image: minio/minio:latest
    container_name: heart-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - heart-network
    profiles:
      - storage

  # ── Observability ──

  # Encoder Worker — L2/L3 vector encoding (runs as FastAPI app with workers enabled)
  encoder-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heart-encoder-worker
    command: ["uvicorn", "heart.api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - .env
    environment:
      - HEART_WORKERS_ENABLED=true
      - DATABASE_URL=postgresql+asyncpg://heart:heartdev@postgres:5432/heart
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health/ready')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - heart-network

  # Prometheus — scrapes heart-api /metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: heart-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - heart-network
    profiles:
      - monitoring

  # Grafana — dashboards provisioned from git
  grafana:
    image: grafana/grafana:latest
    container_name: heart-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/01_turn_health.json
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - heart-network
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  heart-network:
    driver: bridge
