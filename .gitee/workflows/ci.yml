name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -r requirements.txt || echo "requirements.txt not found, skipping"

      - name: Run ruff (linting)
        run: |
          cd backend
          ruff check heart/ --select E,F,W,I,N --ignore E501

      - name: Run ruff (formatting check)
        run: |
          cd backend
          ruff format --check heart/

      - name: Run mypy (type checking)
        run: |
          cd backend
          mypy heart/ --ignore-missing-imports --no-strict-optional

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-mock
          pip install -r requirements.txt || echo "requirements.txt not found, skipping"

      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit -v --cov=heart --cov-report=xml --cov-report=term --cov-report=html

      - name: Archive coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: heart_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: heart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://heart_test:test_password@localhost:5432/heart_test
      REDIS_URL: redis://localhost:6379/0
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      MAIN_LLM_MODEL: deepseek-reasoner
      CHEAP_LLM_MODEL: deepseek-chat

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov asyncpg redis
          pip install -r requirements.txt || echo "requirements.txt not found, skipping"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U heart_test; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Wait for Redis
        run: |
          until redis-cli -h localhost -p 6379 ping; do
            echo "Waiting for Redis..."
            sleep 2
          done

      - name: Setup database schema
        run: |
          cd backend
          # Install pgvector extension
          PGPASSWORD=test_password psql -h localhost -U heart_test -d heart_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

          # Run migrations if alembic is set up
          if [ -f alembic.ini ]; then
            pip install alembic
            alembic upgrade head || echo "Migrations not ready, skipping"
          fi

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration -v --cov=heart --cov-report=xml --cov-report=term --cov-report=html

      - name: Archive coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-coverage-report
          path: backend/htmlcov/
          retention-days: 30

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml jsonschema pydantic

      - name: Validate Soul Spec YAML files
        run: |
          python -c "
          import yaml
          import sys
          from pathlib import Path

          errors = []
          soul_specs_dir = Path('soul_specs')

          if soul_specs_dir.exists():
              for yaml_file in soul_specs_dir.rglob('*.yaml'):
                  try:
                      with open(yaml_file, 'r', encoding='utf-8') as f:
                          data = yaml.safe_load(f)
                      print(f'✓ {yaml_file} is valid YAML')
                  except Exception as e:
                      errors.append(f'✗ {yaml_file}: {e}')
                      print(f'✗ {yaml_file}: {e}')

          if errors:
              print(f'\n{len(errors)} validation errors found')
              sys.exit(1)
          else:
              print('\nAll Soul Spec files are valid')
          "

      - name: Validate config YAML files
        run: |
          python -c "
          import yaml
          import sys
          from pathlib import Path

          errors = []
          config_dir = Path('config')

          if config_dir.exists():
              for yaml_file in config_dir.rglob('*.yaml'):
                  try:
                      with open(yaml_file, 'r', encoding='utf-8') as f:
                          data = yaml.safe_load(f)
                      print(f'✓ {yaml_file} is valid YAML')
                  except Exception as e:
                      errors.append(f'✗ {yaml_file}: {e}')
                      print(f'✗ {yaml_file}: {e}')

          if errors:
              print(f'\n{len(errors)} validation errors found')
              sys.exit(1)
          else:
              print('\nAll config files are valid')
          "

      - name: Validate Kubernetes YAML files
        run: |
          python -c "
          import yaml
          import sys
          from pathlib import Path

          errors = []
          k8s_dir = Path('backend/infra/kubernetes')

          if k8s_dir.exists():
              for yaml_file in k8s_dir.glob('*.yaml'):
                  try:
                      with open(yaml_file, 'r', encoding='utf-8') as f:
                          # K8s YAML can have multiple documents
                          docs = list(yaml.safe_load_all(f))
                      print(f'✓ {yaml_file} is valid YAML ({len(docs)} document(s))')
                  except Exception as e:
                      errors.append(f'✗ {yaml_file}: {e}')
                      print(f'✗ {yaml_file}: {e}')

          if errors:
              print(f'\n{len(errors)} validation errors found')
              sys.exit(1)
          else:
              print('\nAll Kubernetes files are valid')
          "

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: heart/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build orchestrator service image
        if: hashFiles('backend/Dockerfile.orchestrator') != ''
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.orchestrator
          push: false
          tags: heart/orchestrator-service:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build memory service image
        if: hashFiles('backend/Dockerfile.memory') != ''
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.memory
          push: false
          tags: heart/memory-service:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, schema-validation, build-docker]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Schema Validation: ${{ needs.schema-validation.result }}"
          echo "Build Docker: ${{ needs.build-docker.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.schema-validation.result }}" != "success" ] || \
             [ "${{ needs.build-docker.result }}" != "success" ]; then
            echo "CI failed - one or more jobs failed"
            exit 1
          else
            echo "CI passed - all jobs succeeded ✓"
          fi
