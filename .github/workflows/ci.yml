name: CI

# Minimal CI — delegates to scripts/ci.sh so that local and remote behavior stay identical.
# No deploy, no docker push, no codecov upload. Heavy work (integration tests, image
# builds) is opt-in via scripts/ci.sh stages, not the default pipeline.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  ci:
    name: lint + unit + schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run scripts/ci.sh all
        run: bash scripts/ci.sh all
