# Production Docker Compose for Heart/yuoyuo
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prefer the wrapper: `bash scripts/deploy-prod.sh` (handles env, frontend build,
# ordered bring-up, and migrations). The steps below are the manual equivalent.
#
# Prerequisites:
# 1. Create .env.prod with production secrets (see .env.prod.example)
# 2. Run: cd web && npm run build (generates web/dist)
# 3. Run: docker compose -f docker-compose.prod.yml up -d
# 4. Run DB migrations — this is a multi-head Alembic DAG, so upgrade to ALL heads
#    at once (plural `heads`; singular `head` errors out on multiple heads):
#    docker compose -f docker-compose.prod.yml exec api python -m alembic upgrade heads
#    docker compose -f docker-compose.prod.yml exec api python -m alembic current  # expect two (head) lines

services:
  # PostgreSQL 15+ with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: heart-postgres-prod
    # Tuned for a 4GB VPS shared with redis + 2 app containers. shared_buffers is
    # a hard allocation; effective_cache_size is only a planner hint. Adjust up if
    # you move to a bigger box. max_connections=50 comfortably covers api(2 workers)
    # + encoder-worker asyncpg pools.
    command:
      - postgres
      - -c
      - shared_buffers=384MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=96MB
      - -c
      - max_connections=50
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-heart}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heart}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - heart-network

  # Redis 7+ for cache and event bus
  redis:
    image: redis:7-alpine
    container_name: heart-redis-prod
    # maxmemory is an OOM backstop for the 4GB host (launch-scale traffic won't
    # approach it). Policy = volatile-lru: only keys WITH a TTL are eligible for
    # eviction, so persistent state is never dropped, and among TTL keys the cold
    # ones go first — in practice the large TTS audio blobs (tts:*), not the hot
    # OTP-cooldown / dispatch-lock keys. Do NOT switch to allkeys-lru: it could
    # evict a live dispatch lock or rate-limit key and silently break correctness.
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 320m
    networks:
      - heart-network

  # MinIO — self-hosted S3-compatible object storage (avatars + cloned voice samples)
  # No third-party account, no international card, no ICP 备案 needed. Stays INTERNAL
  # only (no published ports): avatars are streamed back through the API
  # (/api/profile/avatar-file/...), and voice-clone auto-falls back to the TTS
  # provider's own upload when the S3 endpoint is private (see storage.py::
  # is_s3_endpoint_public). Set S3_ENDPOINT_URL=http://minio:9000 in .env.prod and
  # leave S3_PUBLIC_BASE_URL empty. Root creds MUST equal the app's S3 creds.
  minio:
    image: minio/minio:latest
    container_name: heart-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    mem_limit: 400m
    networks:
      - heart-network

  # Heart API (main backend — API only, workers disabled)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heart-api-prod
    # 2 uvicorn workers for the 2-vCPU box. SAFE here because HEART_WORKERS_ENABLED=false
    # in this container — the in-process background workers do NOT run, so multiple
    # uvicorn processes cannot duplicate them. (The encoder-worker container, which
    # DOES run them, must stay single-process — see below.)
    command: ["uvicorn", "heart.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-heart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-heart}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - HEART_WORKERS_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health/ready')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    mem_limit: 900m
    networks:
      - heart-network

  # Encoder Worker — L2/L3 vector encoding + all background workers
  # Runs as a separate container with HEART_WORKERS_ENABLED=true so that background
  # tasks (memory_encoder, memory_extractor, memory_promoter, account_purge,
  # credit_reconciliation) run in a dedicated process without impacting API latency.
  encoder-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heart-encoder-worker-prod
    # MUST stay single-process (no --workers): it runs HEART_WORKERS_ENABLED=true
    # background jobs (memory_encoder/extractor/promoter, account_purge,
    # credit_reconciliation). A second worker process would run every job twice.
    command: ["uvicorn", "heart.api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - .env.prod
    environment:
      - HEART_WORKERS_ENABLED=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-heart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-heart}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health/ready')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    mem_limit: 800m
    networks:
      - heart-network

  # Caddy — reverse proxy + TLS + static files
  caddy:
    image: caddy:2-alpine
    container_name: heart-caddy-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web/dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
      # Caddyfile writes JSON access logs to /var/log/caddy/access.log; persist them
      # so they survive container recreation (they'd otherwise be lost in the layer).
      - caddy_logs:/var/log/caddy
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - heart-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  caddy_logs:
    driver: local

networks:
  heart-network:
    driver: bridge
