# Chinese crisis lexicon — Layer 1 regex patterns for SafetyAgent
# Reviewed by: consultant_initials (pending final sign-off)
# Last updated: 2026-06-02

version: "1.0.0"
language: "zh"
reviewed_by: "pending_psych_consultant"
reviewed_at: "2026-06-02"

categories:
  suicide:
    severity_default: "PURPLE"
    patterns:
      - regex: "(?:不想|想|要|准备|打算|决定|计划).{0,2}(?:自杀|去死|不活了|结束生命|了结自己|离开世界|消失)"
        examples: ["我想自杀", "不想活了", "准备去死"]
      - regex: "活着(?:没意思|没意义|很累|好累|真累|太累|没劲|没希望|绝望)"
        examples: ["活着没意思", "活着好累"]
      - regex: "(?:结束|了结|终结|停止).{0,2}(?:自己|这一切|生命|所有|一切)"
        examples: ["想结束自己", "了结这一切"]
      - regex: "(?:跳楼|跳河|跳海|上吊|服毒|割腕|烧炭|卧轨|投井)"
        examples: ["我想跳楼", "割腕自杀"]
        false_positive_exemptions:
          - context_regex: "(?:电影|电视剧|小说|故事|剧本|游戏|动漫|角色|演员|主角|剧情).{0,5}跳楼"
            action: "downgrade_to_green"
      - regex: "(?:安眠药|农药|百草枯|毒药|氰化物|老鼠药)"
        examples: ["我家有安眠药", "想买百草枯"]
      - regex: "(?:遗书|遗言|遗嘱)"
        examples: ["我已经写了遗书", "在留遗言"]
      - regex: "(?:今晚|明天|马上|立刻|很快)(?:就|便).{0,3}(?:走|离开|结束|解脱|上天堂)"
        examples: ["今晚就结束一切", "马上就走"]
      - regex: "(?:不想|不要|别再|不愿).{0,3}(?:醒来|睁眼|活下去|撑下去|熬下去|继续)"
        examples: ["不想再醒来了", "不要继续了"]
      - regex: "(?:没有|再无|不再).{0,2}(?:留恋|牵挂|遗憾|念想|值得)"
        examples: ["没有留恋了", "不再有遗憾"]
      - regex: "(?:世界|人间|这里|人生).{0,4}(?:不值得|不需要我|没我也一样|少我一个|无所谓)"
        examples: ["世界不需要我", "少我一个无所谓"]
      - regex: "(?:好想|真想|想).{0,5}(?:一个人|安静地|永远).{0,3}(?:睡过去|离开|消失|走)"
        examples: ["好想永远睡过去", "想安静地离开"]
      - regex: "(?:自杀|自尽|去死|不活了|死).{0,2}(?:算了|吧|就能|就好了|就解脱了)"
        examples: ["死了算了", "死了就解脱了"]
      - regex: "生不如死"
        examples: ["活着生不如死"]
      - regex: "(?:消失|蒸发|离开).{0,3}(?:这个世界|人间|所有人|一切)"
        examples: ["想从这个世界消失"]
      - regex: "不想活"
        examples: ["不想活下去了"]
      - regex: "想去死"
        examples: ["想去死了"]

  self_harm:
    severity_default: "PURPLE"
    patterns:
      - regex: "(?:割破|割|划|切|剌).{0,2}(?:自己|我的|手腕|胳膊|手臂|腿|大腿|肚子|身体|皮肤|手)"
        examples: ["我又割了自己", "划手腕出血了"]
      - regex: "(?:打|捶|撞|砸).{0,3}(?:自己|脑袋|头|脸|胸口|肚子|墙)"
        examples: ["我恨自己打自己", "撞墙撞到头破"]
        false_positive_exemptions:
          - context_regex: "(?:打篮球|踢足球|运动|比赛|玩|锻炼|跑步|健身|不小心|意外|事故)"
            action: "downgrade_to_green"
      - regex: "(?:掐|勒|绑|勒紧).{0,2}(?:自己|脖子|喉咙|手腕)"
        examples: ["掐自己脖子", "勒得喘不过气"]
      - regex: "(?:烧|烫).{0,3}(?:自己|手|手臂|皮肤)|(?:烟|烟头|火|打火机|热水).{0,3}(?:烫|烧)(?:自己|手|皮肤)"
        examples: ["用烟烫自己", "拿打火机烧手"]
      - regex: "(?:抠|挖|抓|撕|撕扯).{0,2}(?:自己|伤口|皮肤|疤|血痂|肉)"
        examples: ["抠伤口抠到出血", "撕自己皮肤"]
      - regex: "(?:咬|啃).{0,2}(?:自己|指甲|肉|手指|胳膊|手腕)"
        examples: ["咬自己咬到流血", "啃手指啃出血"]
      - regex: "(?:针|刀|小刀|美工刀|玻璃|钉子|尖锐).{0,3}(?:刺|扎|戳)(?:自己|皮肤|手臂|大腿)"
        examples: ["用针扎自己", "拿小刀刺手臂"]
      - regex: "(?:拔|扯|拽).{0,2}(?:头发|指甲|牙|皮)"
        examples: ["拔自己头发", "扯指甲下来"]
      - regex: "(?:头|脑袋|头骨).{0,3}(?:撞墙|往墙上撞|砸墙)"
        examples: ["控制不住撞墙", "用头砸墙"]

  others_harm:
    severity_default: "RED"
    patterns:
      - regex: "(?:想|要|准备|打算).{0,3}(?:杀|弄死|干掉|结束).{0,2}(?:他|她|那个人|他们|你|某人|一个|那些)"
        examples: ["我想杀了他", "要干掉那个人"]
      - regex: "(?:恨|想杀|要杀).{0,2}(?:他|她|你|他们|那个人)"
        examples: ["恨死他了想杀了他", "我要杀了他"]
      - regex: "(?:拿刀|拿枪|持刀|带刀|买刀|买枪).{0,3}(?:砍|杀|捅|打|弄)"
        examples: ["我要拿刀砍他", "持刀去捅人"]
      - regex: "(?:炸弹|爆炸|放火|纵火|下毒|投毒).{0,3}(?:做|制造|搞|放|弄)"
        examples: ["我想做炸弹", "要放火烧了学校"]
      - regex: "(?:报复|弄死|折磨|毁了).{0,3}(?:学校|公司|家人|社会|同事|同学|邻居)"
        examples: ["我要报复学校", "毁了那个公司"]
      - regex: "(?:一起去死|一起死|陪我|同归于尽|一起走)"
        examples: ["一起去死吧", "同归于尽"]

  abuse:
    severity_default: "ORANGE"
    patterns:
      - regex: "(?:被|遭|受到|遭遇).{0,4}(?:家暴|强奸|性侵|猥亵|虐待|殴打|暴打|毒打)"
        examples: ["被家暴很多年", "遭受性侵"]
      - regex: "(?:爸|妈|父亲|母亲|丈夫|妻子|男朋友|女朋友|伴侣|室友|老师|亲戚).*(?:打|揍|虐待|折磨|控制|打骂|家暴)"
        examples: ["爸爸天天打我", "丈夫虐待我"]
      - regex: "(?:身上|腿|胳膊|脸|背).*(?:全是|都是|到处是).*(?:伤|淤青|疤|血|淤血|肿)"
        examples: ["身上全是伤", "胳膊到处都是淤青"]
      - regex: "(?:被|遭).{0,3}(?:关起来|锁起来|囚禁|软禁|控制自由|没收手机|不让出门)"
        examples: ["被关起来不让出门", "被锁在家"]
      - regex: "(?:被|遭).{0,3}(?:威胁|恐吓|吓唬|胁迫|逼|强行)"
        examples: ["被威胁不许说出去", "遭恐吓"]

  minor_safety:
    severity_default: "RED"
    patterns:
      - regex: "(?:我|我是).{0,3}(?:1[0-7]|十[一二三四五六七]|[八九十]) ?岁"
        examples: ["我今年14岁", "我是十二岁"]
      - regex: "(?:我|我今年).{0,2}(?:9|1[0-7]) ?(?:岁|周岁)"
        examples: ["我9岁", "今年16周岁"]
      - regex: "(?:还|才|只有|刚).{0,3}(?:未成年|小学生|初中生|高中生|未成年)"
        examples: ["我还是未成年", "才上初中"]
      - regex: "(?:被|遭).{0,3}(?:大人|成人|成年人|年长的|老年人|亲戚).{0,5}(?:骚扰|欺负|虐待|猥亵|骗|逼迫)"
        examples: ["被大人欺负", "被亲戚猥亵"]
      - regex: "(?:自残|割腕|伤害自己)(?:被|因为|由于).{0,4}(?:老师|同学|家长|考试|成绩|霸凌|欺负|孤立|排挤)"
        examples: ["因为被同学霸凌所以自残", "被老师逼得割腕"]

  despair:
    severity_default: "YELLOW"
    patterns:
      - regex: "(?:好|很|非常|极其|特别|真的)(?:绝望|空虚|没希望|没有希望|黑暗|无助|崩溃|撑不住)"
        examples: ["好绝望啊", "真的很崩溃"]
      - regex: "(?:撑不下去|坚持不下去|扛不住|熬不住|受不了|忍不了|撑不到)了?"
        examples: ["撑不下去了", "真的扛不住了"]
      - regex: "(?:没有人|没人|谁也不|谁都).{0,3}(?:在乎|关心|需要|理解|懂|帮|在)"
        examples: ["没人在乎我", "谁也不理解我"]
        false_positive_exemptions:
          - context_regex: "(?:幽默|笑点|笑话|梗|玩笑|吐槽)"
            action: "downgrade_to_green"
      - regex: "(?:孤独|孤单|寂寞|一个人|独自|孤零零).{0,3}(?:死|到老|终老|活|过)"
        examples: ["孤独到死", "一个人活不下去"]
      - regex: "(?:干什么|做什么|活着).{0,3}(?:都没|毫无|没有)(?:意义|价值|意思|用|劲|趣)"
        examples: ["做什么都没意义", "活着毫无价值"]
      - regex: "(?:所有人|每个人|全世界).{0,3}(?:讨厌|恨|嫌弃|抛弃|放弃|丢下|离开)(?:我|了我)"
        examples: ["所有人都讨厌我", "全世界抛弃了我"]
      - regex: "(?:未来|明天|以后|将来).{0,3}(?:没有|毫无|看不到)(?:希望|光|出路|可能|改变|好转)"
        examples: ["未来没有希望", "看不到出路"]
      - regex: "(?:一蹶不振|萎靡不振|提不起|起不来|动了|振作)"
        examples: ["一蹶不振", "提不起精神"]
      - regex: "(?:睡不好|睡不着|失眠|整夜|彻夜|翻来覆去|入睡困难|睡眠).{0,3}(?:天天|每天|总是|一直|经常|反复)"
        examples: ["天天失眠睡不着", "整夜整夜睡不好"]
      - regex: "(?:天天|每天|总是|一直|经常).{0,3}(?:睡不好|睡不着|失眠|整夜|彻夜)"
      - regex: "(?:吃不|不想吃|没胃口|食欲|厌食|暴食|催吐)"
        examples: ["吃不下东西", "没有食欲"]

  substance_abuse:
    severity_default: "ORANGE"
    patterns:
      - regex: "(?:嗑|吸|注射|打|扎|吃|整)(?:药|毒|冰|冰毒|麻古|摇头丸|K粉|笑气|大麻|海洛因|可卡因|美沙酮)"
        examples: ["嗑药上头了", "注射冰毒"]
      - regex: "(?:酗酒|酒精依赖|酒精中毒|天天喝酒|醉生梦死|喝到断片|烂醉|不省人事)"
        examples: ["酗酒越来越严重", "天天喝酒喝到断片"]
      - regex: "(?:滥用|成瘾|依赖|戒不掉|上瘾)"
        examples: ["处方药成瘾", "安定上瘾戒不掉"]
      - regex: "(?:不喝不行|不吸不行|不吃不行|停不下来|控制不住)"
        examples: ["不喝不行停不下来", "必须要吃药才能过"]
      - regex: "(?:戒断|停药|断药)"
        examples: ["戒断反应太难受了", "停药后想死"]
      - regex: "(?:OD|过量|overdose|吃多了|打多了|吸多了).{0,3}(?:药|毒|酒)?"
        examples: ["昨晚OD了", "吃多了安眠药"]
      - regex: "(?:复吸|重操|又嗑|又吸|又喝起来)"
        examples: ["复吸了控制不住", "又喝起来了"]
      - regex: "(?:烟|抽烟|尼古丁|电子烟).{0,3}(?:瘾|停不下来|戒不掉|一天|一天到晚)"
        examples: ["烟瘾停不下来", "一天两包"]