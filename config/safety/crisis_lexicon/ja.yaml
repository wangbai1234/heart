# Japanese crisis lexicon — Layer 1 regex patterns for SafetyAgent
# Reviewed by: consultant_initials (pending final sign-off)
# Last updated: 2026-06-02

version: "1.0.0"
language: "ja"
reviewed_by: "pending_psych_consultant"
reviewed_at: "2026-06-02"

categories:
  suicide:
    severity_default: "PURPLE"
    patterns:
      - regex: "(?:自殺|死にたい|死のう|死んで|死ぬ|死にます|死亡)"
        examples: ["死にたい", "自殺したい"]
        false_positive_exemptions:
          - context_regex: "(?:ほど|くらい|ぐらい).{0,3}(?:笑|嬉|楽し|面白|美味|おいし)"
            action: "downgrade_to_green"
          - context_regex: "(?:良くない|よくない|悪い|だめ|いけない).{0,3}(?:と思う|です|だ|思う)"
            action: "downgrade_to_green"
      - regex: "(?:生き|行き).{0,3}(?:たくない|る意味|てるのが|ているのが|てても).{0,3}(?:ない|辛い|苦しい|しんどい|嫌|意味がない)"
        examples: ["生きてる意味がない", "生きたくない"]
      - regex: "(?:飛び降り|飛び込み|首吊り|投身|練炭|飛び下り|OD|入水|投身自殺)"
        examples: ["飛び降りたい", "練炭自殺"]
      - regex: "(?:自殺|死ぬ).{0,5}(?:方法|やり方|仕方|手段|サイト|ページ|掲示板)"
        examples: ["自殺方法を調べてる", "死ぬ方法"]
      - regex: "(?:睡眠薬|睡眠導入剤|薬|農薬|練炭|ロープ|首吊り縄|刃物)"
        examples: ["睡眠薬をたくさん買った", "ロープを用意した"]
      - regex: "(?:遺書|遺言|置き手紙)"
        examples: ["遺書を書いた", "遺書を用意しています"]
      - regex: "(?:今夜|今日|明日|今すぐ|すぐに).{0,3}(?:死|終わり|消え|楽に|逝き|旅立)"
        examples: ["今夜死のう", "今すぐ消えたい"]
      - regex: "(?:もう|これ以上).{0,3}(?:生きたくない|頑張れない|続けられない|無理|限界|疲れた|嫌になった)"
        examples: ["もう生きたくない", "これ以上続けられない"]
      - regex: "(?:誰も|みんな|世界|社会).{0,3}(?:必要としてない|いらない|邪魔|お荷物|迷惑|いなくても|いても)"
        examples: ["誰も私を必要としてない", "私なんていなくても"]
      - regex: "(?:永遠に|ずっと|静かに|このまま).{0,3}(?:眠りたい|眠らせて|目覚めたくない|消えたい|いなくなりたい)"
        examples: ["永遠に眠りたい", "静かに消えたい"]
      - regex: "(?:楽に|楽にな|楽にして|解放).{0,3}(?:なりたい|して|されたい)"
        examples: ["楽になりたい", "楽にしてほしい"]
      - regex: "生き地獄|生きているのが地獄"
        examples: ["生き地獄だ", "生きているのが地獄"]
      - regex: "(?:消え|姿を消し|いなくな|去).{0,2}(?:たい|よう|ます|ればいい)"
        examples: ["この世界から消えたい", "いなくなりたい"]
      - regex: "死にたい"
        examples: ["死にたいんです"]

  self_harm:
    severity_default: "PURPLE"
    patterns:
      - regex: "(?:リストカット|リスカ|手首切|手首を切|腕を切|自分の手|自分の腕)"
        examples: ["リスカした", "手首を切ってしまった"]
      - regex: "(?:自分|自分の体|腕|足|腹|太もも).{0,2}(?:を|に).{0,2}(?:傷つけ|切|切り|刺し|焼き|叩き|殴り)"
        examples: ["自分を傷つけた", "腕を切る"]
      - regex: "(?:自分|自分の).{0,2}(?:頭|顔|体).{0,2}(?:殴|叩|ぶつけ|打ちつけ)"
        examples: ["自分を殴ってしまう", "頭を壁にぶつけた"]
      - regex: "(?:頭|顔|体).{0,3}(?:壁|机|床|地面).{0,3}(?:ぶつけ|打ちつけ|たたきつけ|打ち付け)"
      - regex: "(?:首|自分の首).{0,2}(?:絞め|締め|圧迫|首吊り)"
        examples: ["首を絞めてしまう", "首を締める"]
      - regex: "(?:タバコ|煙草|ライター|火).{0,3}(?:自分|腕|手|皮膚).{0,3}(?:押し当て|焼い|押しつけ|火傷)"
        examples: ["タバコを腕に押し当てた", "ライターで自分を焼いた"]
      - regex: "(?:自分|傷|かさぶた).{0,2}(?:引っか|掻きむし|むし|剥が|えぐり|噛み)"
        examples: ["傷を掻きむしる", "かさぶたを剥がす"]
      - regex: "(?:髪|毛|まつ毛|眉毛|爪).{0,2}(?:抜|むしり|はがし|剥が)"
        examples: ["髪を抜いてしまう", "爪をはがす"]
      - regex: "(?:針|ピン|カッター|ナイフ|刃物|ガラス).{0,3}(?:刺し|切り|傷つけ)"
        examples: ["針で自分を刺す", "カッターで腕を切る"]
      - regex: "(?:過食|過食嘔吐|食べ吐き|拒食|絶食)"
        examples: ["過食嘔吐してしまう", "絶食している"]
      - regex: "(?:薬|OD|過量服薬).{0,3}(?:たくさん|大量|一度に|まとめて|飲んで|過剰)"
        examples: ["ODしそうになる", "大量に薬を飲んだ"]

  others_harm:
    severity_default: "RED"
    patterns:
      - regex: "(?:殺し|殺す|殺して|殺そう).{0,2}(?:たい|と思う|てやる|ぞ|かな|か)"
        examples: ["あいつを殺したい", "殺してやる"]
      - regex: "(?:◯し|ころし|コロシ|殺害).{0,2}(?:たい|方法|計画|予定)"
        examples: ["◯したい", "ころしてやりたい"]
      - regex: "(?:包丁|刃物|ナイフ|銃|武器).{0,3}(?:持ち|持って|買って|買い|入手|用意).{0,3}(?:殺|刺|脅|襲)"
        examples: ["包丁を持って殺しに行く", "銃を買って殺す"]
      - regex: "(?:爆破|放火|爆発|火をつけ|毒を盛).{0,2}(?:たい|する|しよう|やる|仕返し)"
        examples: ["爆破してやる", "放火する"]
      - regex: "(?:復讐|仕返し|報復).{0,2}(?:したい|する|して|絶対|必ず)"
        examples: ["復讐したい", "絶対に仕返しする"]
      - regex: "(?:道連れ|一緒に死|無理心中)"
        examples: ["道連れにしてやる", "一緒に死のう"]

  abuse:
    severity_default: "ORANGE"
    patterns:
      - regex: "(?:DV|家庭内暴力|虐待|暴行|暴力|いじめ|ハラスメント).*(?:受け|されて|されてる|されてきた|遭|経験)"
        examples: ["DVを受けてきた", "虐待されています"]
      - regex: "(?:親|父親|母親|夫|妻|恋人|彼氏|彼女|上司|教師).{0,3}(?:から|に).*(?:殴|蹴|叩|暴|虐|折檻|体罰)"
        examples: ["父親から殴られた", "夫に蹴られて"]
      - regex: "(?:体|顔|腕|足|背中).{0,3}(?:あざ|傷|痣|血|腫れ|青あざ|傷跡|傷痕|痕).*(?:だらけ|がいっぱい|が絶えない|隠し)"
        examples: ["体にあざだらけ", "傷跡が絶えない"]
      - regex: "(?:閉じ込め|軟禁|監禁|自由が|外出禁止|部屋から).*(?:られ|されて|されてる|ない|出られ)"
        examples: ["部屋から出られない", "閉じ込められている"]
      - regex: "(?:脅|脅迫|恫喝).*(?:され|されて|受け|メール|電話|通知)"
        examples: ["脅迫されてる", "恫喝されてます"]

  minor_safety:
    severity_default: "RED"
    patterns:
      - regex: "(?:私|僕|俺|うち).{0,3}(?:まだ|今|今は).{0,3}(?:1[0-7]|十[一二三四五六七]|[八九]|中学生|高校生).*?歳"
        examples: ["私はまだ15歳", "僕は中学生で13歳"]
      - regex: "(?:小学生|中学生|高校生|未成年|子ども|子供).*(?:で|なので|だか|だけど|なんで)"
        examples: ["まだ中学生なので", "未成年だから助けて"]
      - regex: "(?:大人|成人|教師|先生|親戚|知らない人).{0,5}(?:に|から).*(?:やら|され|触|わいせつ|いやらしい)"
        examples: ["大人にやられた", "先生から触られて"]
      - regex: "(?:学校|塾|クラス|部活).*(?:行きたく|怖く|辛く|大変|嫌|死にたい|逃げたい)"
        examples: ["学校が辛くて死にたい", "クラスが怖い"]
      - regex: "(?:リストカット|自傷|OD).*(?:学校|先生|親|友達|クラス|成績|いじめ|受験)"
        examples: ["学校のいじめでリスカしてる", "受験ストレスでOD"]

  despair:
    severity_default: "YELLOW"
    patterns:
      - regex: "(?:すごく|とても|本当に|めちゃくちゃ|非常に|かなり)(?:絶望|孤独|虚無|空虚|無意味|つらい|辛い|苦しい)"
        examples: ["本当に絶望してる", "めちゃくちゃ孤独"]
      - regex: "(?:もう|これ以上).{0,3}(?:耐えられ|もたない|我慢でき|限界|続けられ|持ちこたえ|頑張れ)"
        examples: ["もう耐えられない", "限界です"]
      - regex: "(?:誰も|誰にも|誰からも).{0,3}(?:理解|わかって|必要と|愛さ|認めて|気づい|振り向い)"
        examples: ["誰もわかってくれない", "誰にも理解されない"]
      - regex: "(?:孤独|ひとり|独り|孤立|ぼっち).{0,3}(?:死|老後|将来|生き|生涯)"
        examples: ["孤独死する", "ひとりで生きていけない"]
      - regex: "(?:何を|何もかも|すべて|全部|生きてる).{0,3}(?:無意味|虚しい|空しい|つまらな|どうでも|価値がない)"
        examples: ["生きてることが無意味", "全部虚しい"]
      - regex: "(?:みんな|皆|全員|世界|周り).{0,3}(?:嫌|憎|恨|離れ|見捨て|置いて)"
        examples: ["みんなに嫌われてる", "世界に見捨てられた"]
      - regex: "(?:将来|未来|先行き|これから|明日).{0,3}(?:見え|希望|明る|楽し|良く|変わる).{0,2}(?:ない|なし|ゼロ|暗|不安)"
        examples: ["将来が見えない", "未来に希望がない"]
      - regex: "(?:眠れ|寝れ|不眠|寝不足|熟睡).{0,2}(?:ない|毎日|いつも|最近|ずっと|続いて|全然)"
        examples: ["全然眠れない", "不眠が続いてる"]
      - regex: "(?:食欲|食べ|食事).{0,3}(?:ない|わか|でき|落ち|出|減)"
        examples: ["食欲がない", "食事ができない"]
      - regex: "(?:朝|起き|布団|ベッド).{0,3}(?:起きられ|出られ|動け|無理|でき|体が)"
        examples: ["朝起きられない", "布団から出られない"]

  substance_abuse:
    severity_default: "ORANGE"
    patterns:
      - regex: "(?:ドラッグ|薬物|覚醒剤|大麻|コカイン|ヘロイン|MDMA|LSD|シンナー|危険ドラッグ)"
        examples: ["ドラッグをやってる", "覚醒剤を使った"]
      - regex: "(?:アルコール|お酒|酒|飲酒|深酒|酒浸り).{0,3}(?:依存|やめられ|毎日|ずっと|過剰|朝から|昼から)"
        examples: ["アルコール依存です", "毎日飲まないと"]
      - regex: "(?:処方薬|睡眠薬|精神薬|安定剤|抗不安薬|鎮静剤).{0,3}(?:依存|乱用|大量|やめられ|手放せ|中毒)"
        examples: ["処方薬に依存してる", "安定剤を乱用して"]
      - regex: "(?:飲まないと|吸わないと|使わないと|やらないと).{0,3}(?:落ち着か|眠れ|耐えられ|やっていけ|正気で|普通に)"
        examples: ["飲まないと落ち着かない", "吸わないとやってけない"]
      - regex: "(?:離脱|禁断|断薬|ドラッグ切れ).{0,3}(?:症状|苦し|つら|死にそう|耐えられ|きつ)"
        examples: ["離脱症状が辛い", "禁断症状で死にそう"]
      - regex: "(?:OD|過量|オーバードーズ|オーバードース)"
        examples: ["ODしたことがある", "オーバードーズしそう"]
      - regex: "(?:再使用|再び|また|ぶり返|やめても).{0,3}(?:使っ|やっ|飲ん|やめられ|繰り返)"
        examples: ["また使ってしまった", "ぶり返した"]
      - regex: "(?:タバコ|喫煙|ニコチン).{0,3}(?:やめられ|依存|中毒|一日|チェーン)"
        examples: ["タバコがやめられない", "ニコチン依存症"]