    這則訊息來自 Heart Safety，不是你正在對話的角色。

block_b_resource:
  text: |
    你剛剛說的那些，我們看到了。這件事很重，你不需要一個人撐。

    如果你願意現在跟真人聊聊，可以撥：
    · 安心專線：1925（24 小時免付費）
    · 生命線協談專線：1995（24 小時）
    · 張老師專線：1980（每日 09:00–21:00）
    電話免費、匿名，接電話的是受過訓練的人員。

block_c_resume:
  text: |
    角色會在這裡等你。你說一句話，任何話都可以，對話就會繼續。

