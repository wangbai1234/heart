# ============================================================
# Identity Signal Patterns (Regex)
# ============================================================
# Format: {type: regex_pattern_with_capture_group}
# Capture group (括号) extracts the value
identity_patterns:
  # Name patterns - match 2-4 characters after trigger, stop at punctuation
  name: (?:我叫|我的名字(?:是|叫))([^\s,，。!?]{2,4})

  # Birthday patterns (various formats)
  birthday: (?:我(?:的)?生日(?:是)?|生于)(\d{1,2}月\d{1,2}(?:日|号)|\d{4}年\d{1,2}月\d{1,2}(?:日|号)|\d{1,2}/\d{1,2})

  # Age patterns - allow with or without "我/今年"
  age: (?:我|今年)?(\d{1,3})岁

  # Occupation patterns - match "我是X" or "是X" after comma (capture includes suffix)
  occupation: (?:(?:我)?(?:是|做|从事)|我的工作是)(?:一名)?([^\s,，。!?]{0,5}[师员家手人者生])

  # Pet patterns - match "养了X" with or without "我", capture modifiers
  pet: (?:(?:我)?养(?:了)?(?:一只|一个)?|我有(?:一只|一个)?|我的宠物(?:是)?)([^\s,，。!?]{0,4}(?:猫|狗|鸟|鱼|兔|龟|猪|鼠|仓鼠))

  # Location patterns - match places, suffix optional to handle both "上海" and "北京市"
  location: (?:(?:我)?(?:在|住在|来自)|我的家(?:在)?)([^\s,，。!?]{2,6}(?:市|省|国|区|县|镇|村|路|街)?)
