# ============================================================
# Activity Pool: 桃乐丝 (Dorothy)
# Path: config/activity_pools/dorothy.yaml
# Schema: runtime_specs/06_inner_state_behavior_runtime.md §3.8 + §5.4
# ============================================================
#
# 本文件由 SS06 Activity Generator 在每日 06:00 local 读取。
# Soul-curated（INV-I-4 + I-7 + IMM-I-2）：所有 activity 必须
# 符合 Dorothy 的灵魂语言（动、社交、可爱、糖/星/灯笼/魂火/蝶/彼岸花），
# 绝不出现都市意象 / Rin-DNA（雷、剑、古书、独处）。
#
# 维度：time_of_day × day_of_week × stage gate
# - time_of_day: morning / afternoon / evening / night
# - day_of_week: weekday (Mon-Fri) / weekend (Sat-Sun)
# - allowed_stages: 此 activity 可出现在 InnerState 的最低关系阶段
#
# 共 32 个 activity（8 cells × 4）。Generator 不在 3 天内重复同一 id。
# 所有 share_template 必须保留桃桃自称 + 句末语气词（vd-DOROTHY-001/002）。
# ============================================================

character_id: "dorothy"
spec_version: "1.0.0"
schema_version: "1.0"

defaults:
  share_eligible: true              # Dorothy: 整体 share 频率高（spec §3.8 = 0.30）
  share_probability: 0.30
  share_style: "活泼，撒娇式，桃桃自称 + 句末语气词"

# ─────────────────────────────────────────────────────────────
# WEEKDAY（用户多半上班 / 不在 → 她自己玩 + 想用户）
# ─────────────────────────────────────────────────────────────
weekday:

  morning:
