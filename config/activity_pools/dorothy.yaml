      share_eligible: true
      share_template: "嘿嘿宝宝~桃桃在给小熊们点名呢，宝宝也要来排队呀！"

  afternoon:
    - id: dor-wd-a-001
      description: "和冥界的小狗追逐——小狗一直在跑，桃桃假装跑得动。"
