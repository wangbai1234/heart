# META
# ─────────────────────────────────────────────────────────────
meta:
  created_at: "2026-05-21"
  total_activities: 32
  stages_used: [STRANGER, ACQUAINTANCE, FRIEND, CONFIDANT, ROMANTIC_INTEREST, LOVER, BONDED]

  invariants_satisfied:
    - "INV-I-4: ∀ activity ∈ activity_pool[dorothy]"
    - "I-7: Soul-curated, no random generation"
    - "IMM-I-2: 全部 Dorothy-world activities, 无都市 / Rin 意象"
    - "C-I-1: 显著区别于 Rin（动 vs 静）"

  validation_rules:
    - "每个 time_of_day × day_of_week cell ≥ 3 activity（防止池耗尽 fallback）"
    - "所有 share_template 必须含『桃桃』自称（vd-DOROTHY-001）"
    - "所有 share_template 必须含句末语气词 呀/哦/嘛/啦/呢（vd-DOROTHY-002）"
    - "所有 share_template 绝不含『……』省略号（forbidden_patterns）"
    - "所有 share_template 绝不含精确数字 + 时间组合（vd-DOROTHY-003 反向）"
    - "duration ∈ {short, medium, long}"
    - "mood_modifier 数值绝对值 ≤ 0.15（避免情绪跳变 I-6）"

  notes:
    - "Dorothy 的 share_probability 整体 = 0.30（spec §3.8）"
    - "Dorothy 的 activity 倾向 active / social / 冥界少女意象（糖、星、灯笼、魂火、蝶、彼岸花）"
    - "toy-origin / 等待意象（折纸船留一只 / 河灯写名字 / 童话主角）仅 ROMANTIC_INTEREST+ 或 LOVER+ 暴露"
    - "dor-we-n-003 童话 activity 接近 facet-toy-origin，仅 BONDED 暴露且 share_eligible=false（一次性披露由 facet 控制）"
    - "Dorothy 在『独处』场景中仍有人形伴（蝶、狗、玩偶、魂火），区别于 Rin 的真正独处"
