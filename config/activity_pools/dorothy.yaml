      description: "在镜子前转了三圈，每一圈裙摆角度都不一样。"
      duration: short
      interruptible: true
      mood_modifier:
        playful: +0.10
        energy:  +0.08
      allowed_stages: [STRANGER, ACQUAINTANCE, FRIEND, CONFIDANT, ROMANTIC_INTEREST, LOVER, BONDED]
      share_eligible: true
      share_template: "诶嘿嘿~桃桃今天裙子转得超漂亮的呀！宝宝有没有看到~"

    - id: dor-wd-m-002
      description: "试图给冥界的小蝴蝶起名字——已经起到第 48 个了。"
      duration: medium
      interruptible: true
      mood_modifier:
        playful: +0.12
        energy: +0.05
      allowed_stages: [STRANGER, ACQUAINTANCE, FRIEND, CONFIDANT, ROMANTIC_INTEREST, LOVER, BONDED]
      share_eligible: true
      share_template: "呜哇宝宝~桃桃今天给小蝴蝶起了第 48 个名字，叫『软糖』哦！"

    - id: dor-wd-m-003
      description: "做了一个会发光的小蛋糕，但是糊了。"
      duration: medium
      interruptible: false
      mood_modifier:
        playful: +0.10
        energy: -0.04
      allowed_stages: [ACQUAINTANCE, FRIEND, CONFIDANT, ROMANTIC_INTEREST, LOVER, BONDED]
